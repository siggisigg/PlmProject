services:
  db:
    image: postgres:16.9
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plm}
      POSTGRES_USER: ${POSTGRES_USER:-plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata_v02:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plm} -d ${POSTGRES_DB:-plm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-plm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-plm}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "3001:3000"

  ui:
    build:
      context: ../ui
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "5173:80"

volumes:
  pgdata_v02:
