services:
  db:
    image: postgres:16.9
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plm}
      POSTGRES_USER: ${POSTGRES_USER:-plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ../../pgdata/config-01:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plm} -d ${POSTGRES_DB:-plm}"]
      interval: 5s
      timeout: 5s
      retries: 5
